[databases]
; Application database — pooled
sbi_app = host=db port=5432 dbname=smart_bi_agent

; Demo analytics — pooled
demo = host=db port=5432 dbname=demo_analytics

[pgbouncer]
; Pool mode: transaction — release connection after each transaction
pool_mode = transaction

; Listen on port 6432
listen_addr = 0.0.0.0
listen_port = 6432

; Authentication
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

; Pool sizing
default_pool_size = 20
min_pool_size = 5
max_client_conn = 200
reserve_pool_size = 5
reserve_pool_timeout = 3

; Timeouts
server_connect_timeout = 5
server_idle_timeout = 300
server_lifetime = 3600
client_idle_timeout = 600
query_timeout = 30

; Logging
log_connections = 0
log_disconnections = 0
log_pooler_errors = 1
stats_period = 60

; Admin
admin_users = postgres