# Smart BI Agent - Alembic Configuration
# Architecture v3.1
#
# DATABASE_URL is loaded from the environment variable in alembic/env.py.
# Set DATABASE_URL before running any alembic command, e.g.:
#   export DATABASE_URL=postgresql+asyncpg://smart_bi:password@localhost:5432/smart_bi_db
#   alembic upgrade head
#
# The sqlalchemy.url below is a fallback placeholder only.
# env.py overrides it with the DATABASE_URL env var if set.

[alembic]
script_location = alembic
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s
prepend_sys_path = .
version_path_separator = os
truncate_slug_length = 40

# Fallback URL - env.py overrides this with DATABASE_URL env var
sqlalchemy.url = postgresql+asyncpg://smart_bi:SmartBI2026dev@localhost:5432/smart_bi_db

[post_write_hooks]
# No post-write hooks configured

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %%(levelname)-5.5s [%%(name)s] %%(message)s
datefmt = %%H:%%M:%%S