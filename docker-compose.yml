# =============================================================================
# Smart BI Agent — Docker Compose (Production)
# Architecture: v3.1 | Layer 10: Infrastructure
# =============================================================================
# Usage:
#   Production:  docker compose up -d
#   Development: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#   With Ollama: docker compose --profile ollama up -d
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Backend API (FastAPI + uvicorn)
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: sbi-backend
    restart: unless-stopped
    env_file: .env
    environment:
      - APP_ENV=${APP_ENV:-production}
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./keys:/app/keys:ro
    networks:
      - sbi-internal
    # No ports exposed — Nginx fronts everything (Layer 2)
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Frontend (React SPA — served by Nginx in production)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: sbi-frontend
    restart: unless-stopped
    networks:
      - sbi-internal
    # Static files served by Nginx — no direct port exposure

  # ---------------------------------------------------------------------------
  # PostgreSQL 16 — App Database
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: sbi-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - sbi-internal
    # No ports exposed externally — internal network only
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: >
      postgres
        -c shared_buffers=256MB
        -c effective_cache_size=512MB
        -c maintenance_work_mem=128MB
        -c work_mem=16MB
        -c max_connections=100
        -c log_statement=ddl
        -c log_min_duration_statement=1000

  # ---------------------------------------------------------------------------
  # Redis 7 — Segmented (3 Databases)
  # DB 0: Cache (allkeys-lru, degradable)
  # DB 1: Security (noeviction, fail-closed) — T11, T12
  # DB 2: Coordination (volatile-lru)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: sbi-redis
    restart: unless-stopped
    volumes:
      - redisdata:/data
    networks:
      - sbi-internal
    # No ports exposed externally
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command:
      - redis-server
      - --maxmemory
      - 512mb
      - --maxmemory-policy
      - allkeys-lru
      - --databases
      - "3"
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
      - --requirepass
      - ${REDIS_PASSWORD}

  # ---------------------------------------------------------------------------
  # Nginx — Edge Layer (TLS 1.3, HSTS, connection limiting) — Layer 2
  # Blocks external access to Ollama (T32)
  # Rate limits /api/v1/auth/login (double defense)
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: sbi-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - sbi-internal
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ---------------------------------------------------------------------------
  # pg_backup — Daily automated backups (T13)
  # ---------------------------------------------------------------------------
  pg_backup:
    image: prodrigestivill/postgres-backup-local:16
    container_name: sbi-pg-backup
    restart: unless-stopped
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      SCHEDULE: "@daily"
      BACKUP_KEEP_DAYS: 30
      BACKUP_KEEP_WEEKS: 4
      BACKUP_KEEP_MONTHS: 6
      HEALTHCHECK_PORT: 8080
    volumes:
      - pgbackups:/backups
    depends_on:
      db:
        condition: service_healthy
    networks:
      - sbi-internal

  # ---------------------------------------------------------------------------
  # Ollama — Self-hosted LLM (optional profile)
  # SECURITY: localhost-only binding (T32), pinned version (T33)
  # Runtime pulls disabled at Nginx level
  # ---------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:0.5.4    # Pinned version — never use :latest (T33)
    container_name: sbi-ollama
    profiles:
      - ollama                     # Only starts with --profile ollama
    restart: unless-stopped
    volumes:
      - ollama_models:/root/.ollama
    networks:
      - sbi-internal
    # CRITICAL: Bind to localhost ONLY (T32 — 91K attacks on exposed Ollama)
    # Only backend container can reach it via Docker internal network
    # No port mapping = not accessible from host or external
    deploy:
      resources:
        limits:
          memory: 16G
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

# =============================================================================
# Volumes
# =============================================================================
volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
  pgbackups:
    driver: local
  ollama_models:
    driver: local

# =============================================================================
# Networks — Internal only, no external exposure except via Nginx
# =============================================================================
networks:
  sbi-internal:
    driver: bridge
    internal: false  # Needs outbound for LLM API calls (BYOK)
