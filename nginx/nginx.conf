# =============================================================================
# Smart BI Agent — Nginx Configuration (Layer 2: Edge)
# Architecture v3.1 — Security Controls:
#   - TLS 1.3 only (disable 1.0/1.1/1.2)
#   - HSTS max-age=31536000 includeSubDomains
#   - limit_conn 500 total WS connections
#   - Block direct access to Ollama port (T32)
#   - Rate limit /api/v1/auth/login (double defense)
#   - Hide server version headers
# =============================================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    sendfile    on;
    tcp_nopush  on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # Hide Nginx version
    server_tokens off;

    # Rate limit zones (first-line defense — backend has its own Redis-backed limits)
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/m;

    # Connection limit zone for WebSocket
    limit_conn_zone $binary_remote_addr zone=ws_conn:10m;

    # Upstream backends
    upstream backend_api {
        server backend:8000;
        keepalive 32;
    }

    upstream frontend_app {
        server frontend:80;
    }

    # --- HTTP -> HTTPS redirect ---
    server {
        listen 80;
        server_name _;

        # Health check endpoint (available on HTTP for load balancers)
        location = /health {
            proxy_pass http://backend_api/health;
            proxy_set_header Host $host;
        }

        # Redirect everything else to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # --- Main HTTPS server ---
    server {
        listen 443 ssl;
        http2 on;
        server_name _;

        # TLS Configuration
        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_protocols       TLSv1.3;
        ssl_prefer_server_ciphers off;
        ssl_session_timeout 1d;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_tickets off;

        # Security Headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "0" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' wss://$host; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # Request size limits
        client_max_body_size 10m;

        # BLOCK: Ollama external access (T32)
        location ~ ^/(api/tags|api/generate|api/chat|api/pull|api/show|api/embeddings) {
            return 403;
        }

        # API: Auth endpoints — Double rate limiting (T10)
        location /api/v1/auth/login {
            limit_req zone=auth_limit burst=5 nodelay;
            proxy_pass http://backend_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
        }

        # API: WebSocket endpoint — Connection limiting (T26)
        location /api/v1/query/stream {
            limit_conn ws_conn 500;
            proxy_pass http://backend_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Origin $http_origin;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }

        # API: All other backend routes
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://backend_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
        }

        # Health check (proxied to backend)
        location = /health {
            proxy_pass http://backend_api/health;
            proxy_set_header Host $host;
        }

        # Frontend: React SPA (everything else)
        location / {
            proxy_pass http://frontend_app;
            proxy_set_header Host $host;
        }
    }
}
